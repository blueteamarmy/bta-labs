<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTA — Event Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #060a12;
      --bg2:    #090e1a;
      --bg3:    #0d1525;
      --card:   #0f1c30;
      --blue:   #1e90ff;
      --cyan:   #00e5ff;
      --green:  #00e676;
      --orange: #ff9100;
      --red:    #ff1744;
      --white:  #e8f0fe;
      --dim:    #8eaac8;
      --border: #1a2a4a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .data-source {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--dim);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 3px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-group label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .filter-group input,
    .filter-group select {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(30,144,255,0.15);
    }

    .filter-group input { width: 90px; }
    .filter-group select { width: 130px; cursor: pointer; }
    .filter-group .msg-input { width: 200px; }

    .counter {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--cyan);
      white-space: nowrap;
    }

    /* ── Legend ─────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 5px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--dim);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .dot-red    { background: var(--red); }
    .dot-green  { background: var(--green); }
    .dot-orange { background: var(--orange); }

    /* ── Table ───────────────────────────────────────────────── */
    .table-wrapper {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead th {
      background: var(--bg3);
      color: var(--dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 9px 14px;
      text-align: left;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tbody tr {
      border-bottom: 1px solid rgba(26,42,74,0.6);
      cursor: pointer;
      transition: background 0.12s;
    }

    tbody tr:hover td { background: rgba(30,144,255,0.07); }

    tbody tr.selected td {
      background: rgba(30,144,255,0.13) !important;
    }

    tbody tr.selected {
      box-shadow: inset 3px 0 0 var(--blue);
    }

    td {
      padding: 7px 14px;
      vertical-align: middle;
    }

    .col-id   { width: 80px; }
    .col-ts   { width: 170px; }
    .col-lvl  { width: 110px; }
    .col-src  { width: 240px; }

    .mono {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
    }

    .msg-cell {
      color: var(--dim);
      max-width: 320px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Row highlights ──────────────────────────────────────── */
    tr.ev-fail { box-shadow: inset 3px 0 0 var(--red); }
    tr.ev-fail td { background: rgba(255,23,68,0.07); }
    tr.ev-fail:hover td { background: rgba(255,23,68,0.13) !important; }

    tr.ev-ok { box-shadow: inset 3px 0 0 var(--green); }
    tr.ev-ok td { background: rgba(0,230,118,0.06); }
    tr.ev-ok:hover td { background: rgba(0,230,118,0.12) !important; }

    tr.ev-warn { box-shadow: inset 3px 0 0 var(--orange); }
    tr.ev-warn td { background: rgba(255,145,0,0.07); }
    tr.ev-warn:hover td { background: rgba(255,145,0,0.13) !important; }

    /* selected overrides keep the accent color */
    tr.ev-fail.selected  { box-shadow: inset 3px 0 0 var(--red); }
    tr.ev-ok.selected    { box-shadow: inset 3px 0 0 var(--green); }
    tr.ev-warn.selected  { box-shadow: inset 3px 0 0 var(--orange); }

    /* ── Level badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .badge-information { background: rgba(30,144,255,0.18); color: #7ab8ff; border: 1px solid rgba(30,144,255,0.28); }
    .badge-warning     { background: rgba(255,145,0,0.18);  color: #ffb347; border: 1px solid rgba(255,145,0,0.28); }
    .badge-error       { background: rgba(255,23,68,0.18);  color: #ff7090; border: 1px solid rgba(255,23,68,0.28); }
    .badge-critical    { background: rgba(180,0,40,0.28);   color: #ff4060; border: 1px solid rgba(180,0,40,0.5); }

    /* ── Detail panel ────────────────────────────────────────── */
    .detail-panel {
      background: var(--card);
      border-top: 2px solid var(--blue);
      flex-shrink: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.28s ease;
    }

    .detail-panel.open {
      max-height: 300px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .close-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      cursor: pointer;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      transition: border-color 0.2s, color 0.2s;
    }

    .close-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .detail-body {
      padding: 12px 20px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 5px 24px;
      overflow-y: auto;
      max-height: 240px;
    }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      align-items: baseline;
    }

    .detail-key {
      font-family: 'Share Tech Mono', monospace;
      color: var(--dim);
      min-width: 120px;
      flex-shrink: 0;
    }

    .detail-val {
      color: var(--white);
      word-break: break-all;
    }

    .detail-val.hi { color: var(--cyan); }

    /* ── Empty / error states ────────────────────────────────── */
    .state-cell {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
    }

    .error-box {
      background: rgba(255,23,68,0.12);
      border: 1px solid rgba(255,23,68,0.3);
      color: #ff7090;
      padding: 12px 18px;
      border-radius: 5px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-icon">🛡</div>
    <h1>Blue Team Army — Event Viewer</h1>
    <span class="data-source" id="data-source">—</span>
  </header>

  <div class="toolbar">
    <div class="filter-group">
      <label>Event ID</label>
      <input type="text" id="filter-eventid" placeholder="ex: 4625" />
    </div>
    <div class="filter-group">
      <label>Level</label>
      <select id="filter-level">
        <option value="All">All</option>
        <option value="Information">Information</option>
        <option value="Warning">Warning</option>
        <option value="Error">Error</option>
        <option value="Critical">Critical</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Mensagem</label>
      <input type="text" id="filter-message" class="msg-input" placeholder="buscar no texto…" />
    </div>
    <span class="counter" id="counter">— / —</span>
  </div>

  <div class="legend">
    <span class="legend-item"><div class="legend-dot dot-red"></div> 4625 Failed Logon</span>
    <span class="legend-item"><div class="legend-dot dot-green"></div> 4624 Successful Logon</span>
    <span class="legend-item"><div class="legend-dot dot-orange"></div> 4720 Account Created</span>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th class="col-id">Event ID</th>
          <th class="col-ts">Timestamp</th>
          <th class="col-lvl">Level</th>
          <th class="col-src">Source</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="state-cell">Carregando eventos…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="detail-panel" id="detail-panel"></div>

  <script>
  (async function () {
    const params  = new URLSearchParams(location.search);
    const dataUrl = params.get('data') || 'events.json';

    document.getElementById('data-source').textContent = dataUrl;

    let allEvents  = [];
    let selectedIdx = null;

    const elEventId = document.getElementById('filter-eventid');
    const elLevel   = document.getElementById('filter-level');
    const elMessage = document.getElementById('filter-message');
    const tbody     = document.getElementById('tbody');
    const counter   = document.getElementById('counter');
    const panel     = document.getElementById('detail-panel');

    // ── Load ────────────────────────────────────────────────────
    try {
      const res = await fetch(dataUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      allEvents = Array.isArray(json) ? json : (json.events || []);
      allEvents.forEach((ev, i) => { ev._idx = i; });
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="5" class="state-cell">
        <div class="error-box">Erro ao carregar <strong>${esc(dataUrl)}</strong>: ${esc(err.message)}</div>
      </td></tr>`;
      return;
    }

    // ── Helpers ──────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function rowClass(eid) {
      if (eid === 4625) return 'ev-fail';
      if (eid === 4624) return 'ev-ok';
      if (eid === 4720) return 'ev-warn';
      return '';
    }

    function fmtTs(ts) {
      return ts.replace('T', ' ');
    }

    // ── Render table ─────────────────────────────────────────────
    function render() {
      const eid = elEventId.value.trim();
      const lvl = elLevel.value;
      const msg = elMessage.value.toLowerCase();

      const filtered = allEvents.filter(ev => {
        if (eid && !String(ev.EventID).includes(eid)) return false;
        if (lvl !== 'All' && ev.Level !== lvl) return false;
        if (msg && !ev.Message.toLowerCase().includes(msg)) return false;
        return true;
      });

      counter.textContent = `${filtered.length} eventos / ${allEvents.length} total`;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="state-cell">Nenhum evento encontrado.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(ev => {
        const cls = [rowClass(ev.EventID), ev._idx === selectedIdx ? 'selected' : '']
          .filter(Boolean).join(' ');
        return `<tr class="${cls}" data-idx="${ev._idx}">
          <td class="mono col-id">${ev.EventID}</td>
          <td class="mono col-ts">${fmtTs(ev.Timestamp)}</td>
          <td class="col-lvl"><span class="badge badge-${ev.Level.toLowerCase()}">${ev.Level}</span></td>
          <td class="col-src">${esc(ev.Source)}</td>
          <td class="msg-cell" title="${esc(ev.Message)}">${esc(ev.Message)}</td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('tr[data-idx]').forEach(tr => {
        tr.addEventListener('click', () => {
          const idx = parseInt(tr.dataset.idx, 10);
          if (selectedIdx === idx) {
            selectedIdx = null;
            panel.classList.remove('open');
          } else {
            selectedIdx = idx;
            renderDetail(allEvents.find(e => e._idx === idx));
          }
          render();
        });
      });
    }

    // ── Detail panel ─────────────────────────────────────────────
    const HIGHLIGHT_KEYS = new Set(['EventID','IPAddress','User','NewAccountName','SubjectUser']);
    const KEY_LABELS = {
      EventID: 'Event ID', Timestamp: 'Timestamp', Level: 'Level',
      Source: 'Source', Message: 'Message', Computer: 'Computer',
      User: 'User', Domain: 'Domain', LogonType: 'Logon Type',
      IPAddress: 'IP Address', AuthPackage: 'Auth Package',
      ServiceName: 'Service Name', ServiceState: 'Service State',
      SubjectUser: 'Subject User', NewAccountName: 'New Account',
      NewAccountDomain: 'New Domain', LogonID: 'Logon ID',
    };

    function renderDetail(ev) {
      const rows = Object.entries(ev)
        .filter(([k]) => k !== '_idx')
        .map(([k, v]) => {
          const label = KEY_LABELS[k] || k;
          const hi    = HIGHLIGHT_KEYS.has(k) ? ' hi' : '';
          return `<div class="detail-row">
            <span class="detail-key">${esc(label)}</span>
            <span class="detail-val${hi}">${esc(String(v))}</span>
          </div>`;
        }).join('');

      panel.innerHTML = `
        <div class="detail-header">
          <span>Detalhes — EventID ${ev.EventID}: ${esc(ev.Message)}</span>
          <button class="close-btn" id="close-detail">✕ Fechar</button>
        </div>
        <div class="detail-body">${rows}</div>`;

      panel.classList.add('open');

      document.getElementById('close-detail').addEventListener('click', () => {
        panel.classList.remove('open');
        selectedIdx = null;
        render();
      });
    }

    // ── Wire filters ─────────────────────────────────────────────
    elEventId.addEventListener('input',  render);
    elLevel.addEventListener('change',   render);
    elMessage.addEventListener('input',  render);

    render();
  })();
  </script>

</body>
</html>
